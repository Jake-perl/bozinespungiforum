<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cellars and Snakes (Web)</title>
<style>
    body {
        background: black;
        color: white;
        font-family: monospace;
        margin: 0;
        padding: 10px;
    }
    #log {
        height: 400px;
        overflow-y: auto;
        border: 1px solid white;
        padding: 10px;
        margin-bottom: 10px;
    }
    button {
        margin: 3px;
        padding: 8px;
        background: #222;
        color: white;
        border: 1px solid white;
        cursor: pointer;
    }
    button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }
</style>
</head>
<body>

<h2>Cellars and Snakes v0.1.2b (Web)</h2>

<div id="log"></div>

<img id="doorImage"
     src="cnsanimateddoor.png"
     width="32"
     height="32"
     style="
        position: fixed;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        display: none;
        image-rendering: pixelated;
     ">
    
<div>
    <button id="exploreBtn" onclick="performAction('explore')">Explore</button>
    <button onclick="performAction('rest')">Rest</button>
    <button onclick="performAction('status')">Status</button>
    <button onclick="performAction('inventory')">Inventory</button>
    <button onclick="performAction('attack')">Attack</button>
    <button id="shopBtn"
            onclick="performAction('shop')"
            style="display:none;">
        Shop
    </button>
</div>

<div id="shopControls" style="display:none; margin-top:5px;">

    <button onclick="shopBuy(1)">
        Buy +1 Strength (50g)
    </button>

    <button onclick="shopBuy(2)">
        Buy +1 Max HP (20g)
    </button>

    <button onclick="shopBuy(3)">
        Sell All Items
    </button>

    <button onclick="leaveShop()">
        Leave Shop
    </button>

</div>

<script>
let player = {
    HP: 20,
    MaxHP: 20,
    MP: 10,
    EXP: 0,
    Strength: 3,
    Dexterity: 2,
    Constitution: 3,
    Intelligence: 1,
    Wisdom: 2,
    Charisma: 1,
    Inventory: {},
    Gold: 0,
    AP: 3
};

let shopOpen = false;
let enemy = null;
let eventLog = [];
let LEVEL_UP_EXP = 100;
let level = 1;

function log(text) {
    eventLog.push(text);
    let logDiv = document.getElementById("log");
    logDiv.innerHTML = eventLog.slice(-20).join("<br>");
    logDiv.scrollTop = logDiv.scrollHeight;
}

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateEnemy() {
    const enemies = [
        {
            Name: "Goblin",
            HP: () => rand(5, 15) + level * 2,
            AC: () => rand(10, 15) + Math.floor(level / 2)
        },
        {
            Name: "Goblin Brute",
            HP: () => rand(7, 17) + level * 2,
            AC: () => rand(12, 17) + Math.floor(level / 2)
        },
        {
            Name: "Orc",
            HP: () => rand(20, 30) + level * 2,
            AC: () => rand(5, 10) + Math.floor(level / 2)
        },
        {
            Name: "Hovva",
            HP: () => rand(6, 12) + level * 2,
            AC: () => rand(8, 12) + Math.floor(level / 2)
        },
        {
            Name: "bandit",
            HP: () => rand(5, 15) + level * 2,
            AC: () => rand(10, 15) + Math.floor(level / 2)
        },
        {
            Name: "animated door",
            HP: () => rand(0, 1) + level * 3,
            AC: () => rand(50, 51) - Math.floor(level / 2)
        },
                {
            Name: "Unicycle Wizard",
            HP: () => rand(5, 10) + level * 2,
            AC: () => rand(16, 20) + Math.floor(level / 2)
        },
        
    ];

    const enemyType = enemies[Math.floor(Math.random() * enemies.length)];

    return {
        Name: enemyType.Name,
        HP: enemyType.HP(),
        AC: enemyType.AC()
    };
}

function generateItem() {
    let items = [
        "Health Potion", "Magic Scroll", "Silver Key",
        "Rusty Sword", "Golden Coin", "A Book about soil",
        "Goblin mail", "Dragon kir", "rusty bucket",
        "Silver Key", "Health Potion", "Golden Coin",
        "piece of lint", "piece of lint", "piece of lint",
        "piece of lint", "button", "button",
        "herb pouch", "can of worms", "gold tooth",
        "hovva wing", "orc skull", "Ent Bark",
        "strange amulet", "strange token", "strange rock",
        "flat unicycle tyre", "bike seat", "crystal scabbard"
    ];
    return items[rand(0, items.length - 1)];
}

function addToInventory(item) {
    if (player.Inventory[item]) {
        player.Inventory[item]++;
    } else {
        player.Inventory[item] = 1;
    }
}

function updateExploreButton() {
    document.getElementById("exploreBtn").disabled = (enemy !== null);
}

function shopBuy(option) {

    if (!shopOpen) return;

    if (option === 1) {

        if (player.Gold >= 50) {

            player.Gold -= 50;
            player.Strength += 1;

            log("+1 Strength purchased!");
            log(`Gold Remaining: ${player.Gold}`);

        } else {
            log("Not enough gold.");
            log(`Gold: ${player.Gold}`);
        }
    }

    else if (option === 2) {

        if (player.Gold >= 20) {

            player.Gold -= 20;
            player.MaxHP += 1;

            log("+1 Max HP purchased!");
            log(`Gold remaining: ${player.Gold}`);

        } else {
            log("Not enough gold.");
            log(`Gold: ${player.Gold}`);
        }
    }

    else if (option === 3) {

        let itemCount = Object.values(player.Inventory)
                              .reduce((a,b)=>a+b,0);

        if (itemCount > 0) {

            let goldEarned = itemCount * 5;

            player.Gold += goldEarned;
            player.Inventory = {};

            log(`Sold items for ${goldEarned} gold.`);
            log(`Gold: ${player.Gold}`);

        } else {

            log("No items to sell.");
        }
    }
}

function leaveShop() {

    log("You leave the merchant's lair.");

    shopOpen = false;

    document.getElementById("shopControls").style.display = "none";

    document.getElementById("exploreBtn").disabled = false;

}

function performAction(action) {

    if (action === "explore") {
        if (rand(1,100) === 1) {
            shopOpen = true;
            log("You stumble apon the layer of a highly renowned merchant!");

            document.getElementById("shopBtn").style.display = "none";
            document.getElementById("shopControls").style.display = "inline";

            document.getElementById("exploreBtn").disabled = true;

            log("Merchant appears!");
            log("Choose an action below.");

            return;
        }
        let roll = Math.random();
        
        if (roll < 0.3) {
            enemy = generateEnemy();
            log(`You encountered a ${enemy.Name}! HP: ${enemy.HP}, AC: ${enemy.AC}`);
            let doorImg = document.getElementById("doorImage");

            if (enemy.Name === "animated door") {
                doorImg.style.display = "block";
            } else {
                doorImg.style.display = "none";
            }

            updateExploreButton();
        }
        else if (roll < 0.6) {
            let item = generateItem();
            addToInventory(item);
            log(`You found a ${item}!`);
        } 
        else {
            log("You explore but find nothing.");
        }
    }

    else if (action === "rest") {
        player.HP = Math.min(player.HP + 5, player.MaxHP);
        player.AP = Math.min(player.AP + 1, 3);
        log("You rest and recover HP and AP.");
    }

    else if (action === "status") {
        log(`HP:${player.HP} MP:${player.MP} EXP:${player.EXP}/${LEVEL_UP_EXP}
        STR:${player.Strength} DEX:${player.Dexterity} LVL:${level} GOLD:${player.Gold}`);
    }

    else if (action === "inventory") {
        let items = Object.entries(player.Inventory)
            .map(([k,v]) => `${v}x ${k}`);
        log(items.length ? items.join(", ") : "Inventory empty.");
    }

    else if (action === "attack") {
        if (!enemy) {
            log("No enemy to attack.");
            return;
        }

        let roll = rand(1, 20);
        let attackRoll = roll + player.Strength;

        if (roll === 20) {
            enemy.HP = 0;
            log("CRITICAL HIT! Enemy defeated!");
            gainEXP(20);
            enemy = null;
            document.getElementById("doorImage").style.display = "none";
            updateExploreButton();
        }
        else if (attackRoll >= enemy.AC) {
            let dmg = rand(1, 6) + player.Strength;
            enemy.HP -= dmg;

            if (enemy.HP <= 0) {
                log(`You deal ${dmg} damage and kill the enemy!`);
                gainEXP(15);
                player.Gold += rand(5, 10);
                enemy = null;
                document.getElementById("doorImage").style.display = "none";
                updateExploreButton();
            } else {
                log(`You deal ${dmg} damage. Enemy HP: ${enemy.HP}`);
                enemyAttack();
            }
        } 
        else {
            log("You missed!");
            enemyAttack();
        }
    }
    else if (action === "shop") {

        if (!shopOpen) return;

        log("Merchant offers:");
        log("1) +1 Strength (50 gold)");
        log("2) +1 Max HP (20 gold)");
        log("3) Sell all items (5 gold each)");
        log("Type shopBuy(1), shopBuy(2), or shopBuy(3) in console.");
    }

    checkDeath();
}

function enemyAttack() {
    let roll = rand(1, 20);

    if (roll >= 10) {
        let dmg = rand(1, 6);
        player.HP -= dmg;
        log(`Enemy hits you for ${dmg}! HP: ${player.HP}`);
    } else {
        log("Enemy missed!");
    }
}

function gainEXP(amount) {
    player.EXP += amount;
    log(`+${amount} EXP`);

    if (player.EXP >= LEVEL_UP_EXP) {
        player.EXP -= LEVEL_UP_EXP;
        LEVEL_UP_EXP += 50;
        level += 1;
        player.MaxHP += 5;
        player.HP += 5;
        player.Strength++;
        log("LEVEL UP! +HP and +Strength");
    }
}

function checkDeath() {
    if (player.HP <= 0) {
        log("You died. Game Over.");
        document.querySelectorAll("button").forEach(b => b.disabled = true);
    }
}

log("Game Started");
</script>

</body>
</html>
