<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RSS vs Ross - Red Rain</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
}

canvas {
    background: #111;
    display: block;
    margin: auto;
    border: 2px solid red;
}

h1 {
    color: red;
}
</style>

</head>

<body>

<h1>🔴 RSS vs Ross — Red Rain 🔴</h1>
<p>Move RSS. Avoid Ross's red blocks!</p>
<p>Arrow Keys to Move | Survive as long as possible</p>
<p id="score">Time Survived: 0</p>

<canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameOver = false;
let time = 0;

// Player (RSS)
let player = {
    x: 280,
    y: 350,
    width: 30,
    height: 30,
    speed: 5
};

// Red falling blocks (Ross attack)
let blocks = [];

// Controls
let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;

    if (gameOver && e.key === "r") {
        restartGame();
    }
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

// Spawn red block
function spawnBlock() {
    let block = {
        x: Math.random() * (canvas.width - 20),
        y: -20,
        width: 20,
        height: 20,
        speed: 2 + Math.random() * 2
    };

    blocks.push(block);
}

// Restart
function restartGame() {
    blocks = [];
    time = 0;
    gameOver = false;

    player.x = 280;
    player.y = 350;
}

// Update
function update() {

    if (gameOver) return;

    // Movement
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;
    if (keys["ArrowUp"]) player.y -= player.speed;
    if (keys["ArrowDown"]) player.y += player.speed;

    // Bounds
    player.x = Math.max(0,
        Math.min(canvas.width - player.width, player.x));

    player.y = Math.max(0,
        Math.min(canvas.height - player.height, player.y));

    // Spawn blocks randomly
    if (Math.random() < 0.03) {
        spawnBlock();
    }

    // Move blocks
    blocks.forEach((block, index) => {

        block.y += block.speed;

        // Collision
        if (
            player.x < block.x + block.width &&
            player.x + player.width > block.x &&
            player.y < block.y + block.height &&
            player.y + player.height > block.y
        ) {
            gameOver = true;
        }

        // Remove off screen
        if (block.y > canvas.height) {
            blocks.splice(index, 1);
        }
    });

    // Time score
    time += 1/60;

    document.getElementById("score").textContent =
        "Time Survived: " + time.toFixed(1) + "s";
}

// Draw
function draw() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Player (RSS)
    ctx.fillStyle = "lime";
    ctx.fillRect(
        player.x,
        player.y,
        player.width,
        player.height
    );

    ctx.fillStyle = "white";
    ctx.font = "14px Arial";
    ctx.fillText("RSS", player.x + 2, player.y + 20);

    // Red falling blocks (Ross)
    ctx.fillStyle = "red";

    blocks.forEach(block => {
        ctx.fillRect(
            block.x,
            block.y,
            block.width,
            block.height
        );
    });

    // Ross label at top
    ctx.fillStyle = "red";
    ctx.font = "18px Arial";
    ctx.fillText("Ross is attacking!", 220, 20);

    // Game Over
    if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 190, 180);

        ctx.font = "20px Arial";
        ctx.fillText("Press R to Restart", 210, 220);
    }
}

// Game loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
